[package]
name = "jux"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "The Jux project tool. Reads jux.toml, resolves dependencies, dispatches juxc."
build = "build.rs"

[[bin]]
name = "jux"
path = "src/main.rs"

[dependencies]
juxc-driver      = { workspace = true }
juxc-source      = { workspace = true }
juxc-diagnostics = { workspace = true }
anyhow           = { workspace = true }
clap             = { workspace = true }
# `toml` parses the project manifest (`jux.toml`). The minimal-
# feature build avoids pulling in serde so the bare reader stays
# small. Project mode (`jux build`/`run`/`check` without a file)
# uses this to discover the package layout.
toml             = { version = "0.8", default-features = false, features = ["parse"] }

# Embed Windows resources (icon + VERSIONINFO with product name,
# company, copyright, file/product version). Only active on the
# MSVC/mingw toolchain — `build.rs` is a no-op elsewhere.
[target.'cfg(windows)'.build-dependencies]
winres = "0.1"
