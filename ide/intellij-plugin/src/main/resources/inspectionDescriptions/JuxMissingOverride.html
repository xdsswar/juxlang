<body>
Reports methods that redeclare a supertype method (same name and parameter count,
resolved across the project) without an <code>@override</code> annotation.
<p>
Jux annotations are case-insensitive — <code>@Override</code> and <code>@OVERRIDE</code>
both satisfy the check. The quick-fix inserts <code>@override</code> above the method.
</p>
