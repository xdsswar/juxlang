# Plugin coordinates and platform target. Bumped in lockstep with the juxc
# toolchain minor version (JUX-INTELLIJ-PLUGIN-ADDENDUM.md §I.9).
pluginGroup=dev.jux
pluginVersion=0.0.1

# Minimum platform build the plugin declares compatibility from. 242 (2024.2)
# is the first IDE on JBR 21, which the plugin's Java-21 bytecode requires; it
# uses only long-stable platform APIs above that floor.
pluginSinceBuild=242

# Compile/run against the user's IDE: IntelliJ IDEA Community 2026.1.3. The
# plugin only depends on `com.intellij.modules.platform`, so it also loads in
# CLion, GoLand, PyCharm, RustRover, etc.
platformVersion=2026.1.3

# Gradle ergonomics.
org.gradle.configuration-cache=true
org.gradle.caching=true
kotlin.stdlib.default.dependency=false
